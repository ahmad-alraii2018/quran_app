name: Cordova Pure Android Build 2026

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI Globally
        run: npm install -g cordova@13

      - name: Execute Cordova Native Core Setup
        run: |
          cordova create project com.islamic.encyclopedia2026 "Al-Mawsooah"
          cd project
          rm -rf www/*
          
          # سحب كافة ملفاتك الـ 9 الحقيقية المتواجدة بالمستودع أوتوماتيكياً
          cp -r ../* www/ || true
          
          # ربط نظام الإعلانات الصافي بأسفل الواجهة الرئيسية بالملي
          if [ -f "www/index.html" ]; then
            sed -i "s/<\/head>/<script src=\"security_core.js\"><\/script><script>document.addEventListener('deviceready', () => { admob.banner.show({ id: 'ca-app-pub-1634388473102203\/9332526734' }); }, false);<\/script><\/head>/" www/index.html
          fi

      - name: Inject AdMob Plus Core Plugins
        working-directory: project
        run: |
          cordova plugin add admob-plus-cordova --variable APP_ID_ANDROID="ca-app-pub-1634388473102203~1142668223" || true
          cordova plugin add cordova-plugin-privacyscreen || true

      - name: Update Identity Profiles
        working-directory: project
        run: |
          sed -i 's/id="[^"]*"/id="com.islamic.encyclopedia2026"/' config.xml
          sed -i 's/version="[^"]*"/version="3.2.0"/' config.xml
          sed -i 's/<widget/<widget android-versionCode="10"/' config.xml

      - name: Setup Android Compilation Layer
        working-directory: project
        run: |
          cordova platform add android
          cordova build android --release -- --packageType=apk

      - name: Master Cryptographic Certificate Signing
        working-directory: project
        run: |
          APK_RAW=$(find platforms/android/ -name "*.apk" -print -quit)
          cd $(dirname "$RAW")
          keytool -genkeypair -v -keystore quran.keystore -alias quran_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass quran2026 -keypass quran2026 -dname "CN=islamic, OU=Encyclopedia, O=Dev, L=Unknown, S=Unknown, C=US"
          BUILD_TOOLS=$(dirname $(find /usr/local/lib/android/sdk/build-tools/ -name "apksigner" -print -quit))
          $BUILD_TOOLS/zipalign -v 4 $(basename "$RAW") aligned-release.apk
          $BUILD_TOOLS/apksigner sign --ks quran.keystore --ks-key-alias quran_alias --ks-pass pass:quran2026 --key-pass pass:quran2026 --out verified-release.apk aligned-release.apk
          cp verified-release.apk $GITHUB_WORKSPACE/com.islamic.encyclopedia2026-v3.2.0.apk

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quran-app-release-2026
          path: com.islamic.encyclopedia2026-v3.2.0.apk
