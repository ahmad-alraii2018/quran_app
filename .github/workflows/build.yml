name: Supreme Cordova Quran App Compiler 2026

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI Globally
        run: npm install -g cordova@13

      - name: Step A - Smart Extraction and Root Coercion
        run: |
          unzip -q quran_final_2026.zip
          # Deep structural check to find where www folder is located after unzip
          WWW_DIR=$(find . -type d -name "www" -print -quit)
          if [ -z "$WWW_DIR" ]; then
            echo "Critical Error: www folder not found inside the zip archive!"
            exit 1
          fi
          echo "Found source www folder at: $WWW_DIR"
          # Move everything out to the main runner root workspace safely
          mkdir -p extracted_assets
          cp -r $WWW_DIR/. extracted_assets/

      - name: Step B - Identity Injection and Cordova Core Creation
        run: |
          cordova create quran_project com.dev2.quranapp "Quran App"
          cd quran_project
          # Wipe default cordovan template assets
          rm -rf www/*
          # Inject your real Quranic web files into the build core
          cp -r ../extracted_assets/. www/

      - name: Update Configuration Architecture
        working-directory: quran_project
        run: |
          sed -i 's/id="[^"]*"/id="com.dev2.quranapp"/' config.xml
          sed -i 's/version="[^"]*"/version="2.0.0"/' config.xml
          sed -i 's/<widget/<widget android-versionCode="2"/' config.xml
          sed -i '/<\/widget>/i \    <icon src="www\/img\/logo.png" \/>' config.xml

      - name: Prepare and Deploy Android Platform
        working-directory: quran_project
        run: |
          cordova platform add android || true

      - name: Step C - Supreme Multi Path Icon Injection
        working-directory: quran_project
        run: |
          # Force copy logo across all mipmap targets to overwrite the gray robot icon
          RES_DIR="platforms/android/app/src/main/res"
          if [ -d "$RES_DIR" ]; then
            find "$RES_DIR" -type d -name "mipmap-*" | while read -r dir; do
              cp www/img/logo.png "$dir/ic_launcher.png"
              cp www/img/logo.png "$dir/ic_launcher_foreground.png"
              echo "Overwrote launcher icons in: $dir"
            done
          fi

      - name: Step D & E - Defeat AAPT Cruncher and Fix Targeting R Uncompressed Crash
        working-directory: quran_project
        run: |
          # Disable AAPT image validation crashers
          echo "android.aaptOptions.cruncherEnabled=false" >> platforms/android/gradle.properties
          
          # Append noCompress 'arsc' to prevent targeting R+ parsing failures on Android 14
          cat << 'EOF' >> platforms/android/app/build.gradle
          android {
              aaptOptions {
                  noCompress 'arsc'
              }
          }
          EOF

      - name: Step F - Production Compilation and Advanced Key Signing
        working-directory: quran_project
        run: |
          cordova build android --release -- --packageType=apk
          
          APK_PATH=$(find platforms/android/ -name "*unsigned.apk" -print -quit)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find platforms/android/ -name "*.apk" -print -quit)
          fi
          
          echo "Targeting compiled production binary at: $APK_PATH"
          APK_DIR=$(dirname "$APK_PATH")
          APK_FILE=$(basename "$APK_PATH")
          
          cd "$APK_DIR"
          
          keytool -genkeypair -v \
            -keystore quran.keystore \
            -alias quran_alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass quran2026 \
            -keypass quran2026 \
            -dname "CN=dev2, OU=QuranApp, O=Dev, L=Unknown, S=Unknown, C=US"
            
          BUILD_TOOLS_DIR=$(dirname $(find /usr/local/lib/android/sdk/build-tools/ -name "apksigner" -print -quit))
          
          $BUILD_TOOLS_DIR/zipalign -v 4 "$APK_FILE" aligned-release.apk
          
          $BUILD_TOOLS_DIR/apksigner sign --ks quran.keystore \
            --ks-key-alias quran_alias \
            --ks-pass pass:quran2026 \
            --key-pass pass:quran2026 \
            --out verified-release.apk aligned-release.apk
            
          cp verified-release.apk $GITHUB_WORKSPACE/com.dev2.quranapp-v2.0.0.apk

      - name: Upload Master Piece Quran App to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quran-app-release-2026
          path: com.dev2.quranapp-v2.0.0.apk
