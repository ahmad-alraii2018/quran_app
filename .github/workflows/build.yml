name: Cordova Build and Sign APK 2026

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI
        run: npm install -g cordova@13

      - name: Auto Setup Cordova Project
        id: cordova-setup
        run: |
          cordova create quran_project com.dev2.quranapp QuranApp
          cd quran_project
          if [ -d "../www" ]; then
            cp -r ../www/. www/
          elif [ -d "../public" ]; then
            cp -r ../public/. www/
          fi
          echo "project_dir=quran_project" >> $GITHUB_OUTPUT

      - name: Inject Version and Config Identity
        working-directory: ${{ steps.cordova-setup.outputs.project_dir }}
        run: |
          sed -i 's/id="[^"]*"/id="com.dev2.quranapp"/' config.xml
          sed -i 's/version="[^"]*"/version="2.0.0"/' config.xml
          sed -i 's/<widget/<widget android-versionCode="2"/' config.xml

      - name: Prepare and Build Cordova Android
        working-directory: ${{ steps.cordova-setup.outputs.project_dir }}
        run: |
          cordova platform add android || true
          cordova build android --release -- --packageType=apk

      - name: ZipAlign and Sign APK (V2 Signing)
        working-directory: ${{ steps.cordova-setup.outputs.project_dir }}
        run: |
          APK_PATH=$(find platforms/android/ -name "*unsigned.apk" -print -quit)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find platforms/android/ -name "*.apk" -print -quit)
          fi
          
          if [ -z "$APK_PATH" ]; then
            echo "Error: Generated APK file could not be found!"
            exit 1
          fi
          
          APK_DIR=$(dirname "$APK_PATH")
          APK_FILE=$(basename "$APK_PATH")
          
          cd "$APK_DIR"
          
          # 1. Generate Keystore
          keytool -genkeypair -v \
            -keystore quran.keystore \
            -alias quran_alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass quran2026 \
            -keypass quran2026 \
            -dname "CN=dev2, OU=QuranApp, O=Dev, L=Unknown, S=Unknown, C=US"
            
          # 2. Find Android Build Tools for zipalign and apksigner
          BUILD_TOOLS_DIR=$(dirname $(find /usr/local/lib/android/sdk/build-tools/ -name "apksigner" -print -quit))
          echo "Using Android Build Tools from: $BUILD_TOOLS_DIR"
          
          # 3. ZipAlign the APK (Fixes the resource.arsc error)
          $BUILD_TOOLS_DIR/zipalign -v 4 "$APK_FILE" aligned-release.apk
          
          # 4. Sign with apksigner (V2/V3 Signature required for Android 30+)
          $BUILD_TOOLS_DIR/apksigner sign --ks quran.keystore \
            --ks-key-alias quran_alias \
            --ks-pass pass:quran2026 \
            --key-pass pass:quran2026 \
            --out verified-release.apk aligned-release.apk
            
          cp verified-release.apk $GITHUB_WORKSPACE/com.dev2.quranapp-v2.0.0.apk

      - name: Upload Signed APK to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: quran-app-release-2026
          path: com.dev2.quranapp-v2.0.0.apk
