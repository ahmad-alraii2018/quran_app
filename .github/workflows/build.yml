    - name: Force Generate Clean Core Config Files
      run: |
        cat << 'EOF' > package.json
        {
          "name": "com.dev2.quranapp",
          "displayName": "Quran App",
          "version": "2.0.0",
          "dependencies": { "cordova-android": "^13.0.0" }
        }
        EOF
        cat << 'EOF' > config.xml
        <?xml version='1.0' encoding='utf-8'?>
        <widget id="com.dev2.quranapp" version="2.0.0" xmlns="http://w3.org">
            <name>Quran App</name>
            <description>Quran Islamic Encyclopedia 2026</description>
            <content src="index.html" />
            <access origin="*" />
            <preference name="AndroidXEnabled" value="true" />
            <icon src="www/img/logo.png" />
        </widget>
        EOF
