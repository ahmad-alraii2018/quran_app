name: Cordova Android Cloud Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Smart Unzip Quran App Content
      run: |
        unzip quran_app.zip
        if [ -d "quran_app" ]; then
          mv quran_app/* . 2>/dev/null || true
        fi
        ls -la

    - name: Set up Java JDK 17 Environment
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK & Accept Licenses
      uses: android-actions/setup-android@v3

    - name: Install Node.js & Cordova CLI
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: npm install -g cordova

    - name: Initialize Project & Generate Android Platform
      run: |
        cordova platform add android --noscript

    - name: Compile and Build APK via Internal Gradle Engine
      run: |
        cordova build android --release --device

    - name: Upload Finished APK Artifact to Cloud Storage
      uses: actions/upload-artifact@v4
      with:
        name: quran-app-release-apk
        path: platforms/android/app/build/outputs/apk/release/*.apk
