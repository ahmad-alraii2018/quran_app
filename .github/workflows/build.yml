name: Cordova Build and Sign APK 2026

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI
        run: npm install -g cordova@13

      - name: Auto Setup Cordova Project
        id: cordova-setup
        run: |
          cordova create quran_project com.dev2.quranapp QuranApp
          cd quran_project
          if [ -d "../www" ]; then
            cp -r ../www/. www/
          elif [ -d "../public" ]; then
            cp -r ../public/. www/
          fi
          echo "project_dir=quran_project" >> $GITHUB_OUTPUT

      - name: Inject Version and Config Identity
        working-directory: ${{ steps.cordova-setup.outputs.project_dir }}
        run: |
          sed -i 's/id="[^"]*"/id="com.dev2.quranapp"/' config.xml
          sed -i 's/version="[^"]*"/version="2.0.0"/' config.xml
          sed -i 's/<widget/<widget android-versionCode="2"/' config.xml

      - name: Prepare and Build Cordova Android
        working-directory: ${{ steps.cordova-setup.outputs.project_dir }}
        run: |
          cordova platform add android || true
          cordova build android --release

      - name: Sign App Bundle with Embedded Credentials
        working-directory: ${{ steps.cordova-setup.outputs.project_dir }}
        run: |
          cd platforms/android/app/build/outputs/bundle/release/
          
          keytool -genkeypair -v \
            -keystore quran.keystore \
            -alias quran_alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass quran2026 \
            -keypass quran2026 \
            -dname "CN=dev2, OU=QuranApp, O=Dev, L=Unknown, S=Unknown, C=US"
            
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore quran.keystore \
            -storepass quran2026 \
            -keypass quran2026 \
            app-release.aab quran_alias
            
          mv app-release.aab com.dev2.quranapp-v2.0.0.aab
          mv com.dev2.quranapp-v2.0.0.aab ../../../../../../../

      - name: Upload Signed App Bundle to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: quran-app-release-2026
          path: com.dev2.quranapp-v2.0.0.aab
