name: Cordova Pure Android Production Update 2026

on:
  push:
    branches:
      - main
      - master

env:
  ANDROID_BUILD_VERSION_CODE: "10"
  ANDROID_BUILD_VERSION_NAME: "3.2.0"
  CORDOVA_APP_IDENTIFIER: "com.islamic.encyclopedia2026"
  CORDOVA_APP_NAME: "Al-Mawsooah"

jobs:
  compile_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Deploy Java Environment (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Deploy Node.js Environment v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI
        run: npm install -g cordova@13

      - name: Auto Setup App Core Container
        run: |
          cordova create quran_project $CORDOVA_APP_IDENTIFIER "$CORDOVA_APP_NAME"
          cd quran_project
          rm -rf www/*
          cp ../*.html www/ || true
          cp ../*.js www/ || true
          cp ../*.css www/ || true
          if [ -f "www/index.html" ]; then
            sed -i 's/<\/head>/<script src="security_core.js"><\/script><link rel="stylesheet" href="style.css"><\/head>/' www/index.html
          fi

      - name: Update Global Identity Manifest
        working-directory: quran_project
        run: |
          sed -i "s/id=\"[^\"]*\"/id=\"$CORDOVA_APP_IDENTIFIER\"/" config.xml
          sed -i "s/version=\"[^\"]*\"/version=\"$ANDROID_BUILD_VERSION_NAME\"/" config.xml
          sed -i "s/<widget/<widget android-versionCode=\"$ANDROID_BUILD_VERSION_CODE\"/" config.xml

      - name: Setup Android Compilation Layer
        working-directory: quran_project
        run: |
          cordova platform add android || true
          cordova build android --release -- --packageType=apk

      - name: Move and Prepare Final Target APK
        run: |
          APK_RAW=$(find quran_project/platforms/android/ -name "*.apk" -print -quit)
          if [ ! -z "$APK_RAW" ]; then
            cp "$APK_RAW" $GITHUB_WORKSPACE/Al-Mawsooah-v3.2.0.apk
          else
            exit 1
          fi

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quran-app-release-2026
          path: Al-Mawsooah-v3.2.0.apk
