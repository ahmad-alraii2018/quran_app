name: Ultimate Quran App Full Cloud Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Smart Unzip & Path Correction
      run: |
        unzip -q quran_final_2026.zip || unzip -q quran_app.zip || unzip -q *.zip || echo "No zip found"
        if [ -d "quran_final_2026" ]; then
          cp -r quran_final_2026/* . 2>/dev/null || true
        elif [ -d "quran_app" ]; then
          cp -r quran_app/* . 2>/dev/null || true
        fi

    - name: Set up Java JDK 17 Environment
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK & Accept Licenses
      uses: android-actions/setup-android@v3

    - name: Install Pure Cordova CLI
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install Cordova Global
      run: npm install -g cordova

    - name: Force Clean and Repair Config Files
      run: |
        rm -rf platforms/android plugins/ node_modules/ package-lock.json
        
        # إعادة كتابة config.xml بروابط حديثة متوافقة مع أندرويد 14 لمنع مشاكل القراءة
        cat << 'EOF' > config.xml
        <?xml version='1.0' encoding='utf-8'?>
        <widget id="com.ahmed.quranapp" version="1.0.0" xmlns="http://w3.org" xmlns:cdv="http://apache.org">
            <name>Quran App</name>
            <description>Quran Islamic Encyclopedia 2026</description>
            <author email="dev@quranapp.com" href="http://quranapp.com">Ahmed Dev</author>
            <content src="index.html" />
            <access origin="*" />
            <allow-intent href="http://*/*" />
            <allow-intent href="https://*/*" />
            <preference name="AndroidXEnabled" value="true" />
            <preference name="GradleVersion" value="8.7" />
            <icon src="www/img/logo.png" />
        </widget>
        EOF

        # إعادة بناء package.json نظيف يمنع التعارضات
        cat << 'EOF' > package.json
        {
          "name": "com.ahmed.quranapp",
          "displayName": "QuranApp",
          "version": "1.0.0",
          "description": "Quran Islamic Encyclopedia 2026",
          "main": "index.js",
          "keywords": [
            "ecosystem:cordova"
          ],
          "author": "Ahmed Dev",
          "license": "ISC",
          "dependencies": {
            "cordova-android": "^13.0.0"
          }
        }
        EOF
        
        npm install

    - name: Create Android Platform
      run: |
        cordova platform add android@13.0.0 --noscript
        cordova prepare android

    - name: Supreme Local Icon Injection & Sync
      run: |
        mkdir -p www/img 2>/dev/null
        cp logo.png www/img/logo.png 2>/dev/null || true
        mkdir -p platforms/android/app/src/main/res/mipmap-mdpi platforms/android/app/src/main/res/mipmap-hdpi platforms/android/app/src/main/res/mipmap-xhdpi platforms/android/app/src/main/res/mipmap-xxhdpi 2>/dev/null
        cp logo.png platforms/android/app/src/main/res/mipmap-mdpi/icon.png 2>/dev/null || cp www/img/logo.png platforms/android/app/src/main/res/mipmap-mdpi/icon.png 2>/dev/null || true
        cp logo.png platforms/android/app/src/main/res/mipmap-hdpi/icon.png 2>/dev/null || cp www/img/logo.png platforms/android/app/src/main/res/mipmap-hdpi/icon.png 2>/dev/null || true
        cp logo.png platforms/android/app/src/main/res/mipmap-xhdpi/icon.png 2>/dev/null || cp www/img/logo.png platforms/android/app/src/main/res/mipmap-xhdpi/icon.png 2>/dev/null || true
        cp logo.png platforms/android/app/src/main/res/mipmap-xxhdpi/icon.png 2>/dev/null || cp www/img/logo.png platforms/android/app/src/main/res/mipmap-xxhdpi/icon.png 2>/dev/null || true

    - name: Generate Official Production Signing Keystore & Build Config
      run: |
        keytool -genkey -v -keystore quran.keystore -alias quran_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass quran2026 -keypass quran2026 -dname "CN=QuranApp, OU=Dev, O=Islamic, L=Makkah, S=Hijaz, C=SA"
        cat << 'EOF' > build.json
        {
          "android": {
            "release": {
              "keystore": "quran.keystore",
              "storePassword": "quran2026",
              "alias": "quran_alias",
              "password" : "quran2026",
              "keystoreType": "",
              "packageType": "apk"
            }
          }
        }
        EOF

    - name: Compile and Build Official Signed APK
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://gradle.org
      run: |
        cordova build android --release --device

    - name: Upload Finished Signed APK to Cloud Storage
      uses: actions/upload-artifact@v4
      with:
        name: quran-app-final-apk
        path: platforms/android/app/build/outputs/**/*.apk
