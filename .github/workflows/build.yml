name: Cordova Pure Android Signed Production 2026

on:
  push:
    branches:
      - main
      - master

env:
  ANDROID_BUILD_VERSION_CODE: "10"
  ANDROID_BUILD_VERSION_NAME: "3.2.0"
  CORDOVA_APP_IDENTIFIER: "com.islamic.encyclopedia2026"
  CORDOVA_APP_NAME: "Al-Mawsooah"

jobs:
  compile_signed_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Deploy Java Environment (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Deploy Node.js Environment v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI
        run: npm install -g cordova@13

      - name: Auto Setup App Core Container
        run: |
          cordova create quran_project $CORDOVA_APP_IDENTIFIER "$CORDOVA_APP_NAME"
          cd quran_project
          rm -rf www/*
          cp ../*.html www/ || true
          cp ../*.js www/ || true
          cp ../*.css www/ || true
          if [ -f "www/index.html" ]; then
            sed -i 's/<\/head>/<script src="security_core.js"><\/script><link rel="stylesheet" href="style.css"><\/head>/' www/index.html
          fi

      - name: Update Global Identity Manifest
        working-directory: quran_project
        run: |
          sed -i "s/id=\"[^\"]*\"/id=\"$CORDOVA_APP_IDENTIFIER\"/" config.xml
          sed -i "s/version=\"[^\"]*\"/version=\"$ANDROID_BUILD_VERSION_NAME\"/" config.xml
          sed -i "s/<widget/<widget android-versionCode=\"$ANDROID_BUILD_VERSION_CODE\"/" config.xml

      - name: Setup Android platform layer
        working-directory: quran_project
        run: |
          cordova platform add android || true
          cordova build android --release -- --packageType=apk

      - name: Inject Cryptographic Keystore and APKSigner
        working-directory: quran_project
        run: |
          RAW_APK=$(find platforms/android/ -name "*.apk" -print -quit)
          cd $(dirname "$RAW_APK")
          
          # توليد مفتاح أمان رقمي معتمد لفك قفل الحزمة على هواتف أندرويد
          keytool -genkeypair -v -keystore release.keystore -alias release_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass target2026 -keypass target2026 -dname "CN=islamic, OU=Dev, O=App, L=Unknown, S=Unknown, C=US"
          
          BUILD_TOOLS=$(dirname $(find /usr/local/lib/android/sdk/build-tools/ -name "apksigner" -print -quit))
          
          $BUILD_TOOLS/zipalign -v 4 $(basename "$RAW_APK") aligned-release.apk
          $BUILD_TOOLS/apksigner sign --ks release.keystore --ks-key-alias release_alias --ks-pass pass:target2026 --key-pass pass:target2026 --out signed-release.apk aligned-release.apk
          
          cp signed-release.apk $GITHUB_WORKSPACE/Al-Mawsooah-v3.2.0.apk

      - name: Upload Verified APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quran-app-release-2026
          path: Al-Mawsooah-v3.2.0.apk
